name: Update AUR Package

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm git base-devel curl jq openssh

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run update script
        run: |
          # makepkg cannot be run as root
          useradd -m builder
          chown -R builder:builder .
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          
          # Fix "dubious ownership" error
          git config --global --add safe.directory /__w/sidra-bin/sidra-bin
          su builder -c "git config --global --add safe.directory /__w/sidra-bin/sidra-bin"
          
          # Run the update script as builder
          su builder -c "./update.sh"

      - name: Check for changes
        id: git-check
        run: |
          if git diff --exit-code; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync changes
        if: steps.git-check.outputs.changed == 'true' || github.event_name == 'push'
        run: |
          # 1. Setup Git Identity
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 2. Handle GitHub Push (only if the script found an update)
          if [ "${{ steps.git-check.outputs.changed }}" = "true" ]; then
            git add PKGBUILD .SRCINFO
            NEW_VER=$(grep -P '^pkgver=' PKGBUILD | cut -d= -f2)
            git commit -m "chore: update to ${NEW_VER} [skip ci]"
            git push origin main
          fi

          # 3. Setup SSH for AUR
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # Start ssh-agent and add key
          eval $(ssh-agent -s)
          printf "%s\n" "${{ secrets.AUR_SSH_PRIVATE_KEY }}" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-add ~/.ssh/id_rsa
          
          # 4. Handle AUR Push
          # The AUR does not allow subdirectories (like .github).
          # We clone the AUR repo, update its contents, and push to preserve history.
          export GIT_SSH_COMMAND="ssh -o StrictHostKeyChecking=no"
          cd /tmp
          git clone ssh://aur@aur.archlinux.org/sidra-bin.git aur-pkg
          
          # Copy files from the workspace to the clone
          # Note: $GITHUB_WORKSPACE is where the action checked out the GitHub repo
          cp "$GITHUB_WORKSPACE/PKGBUILD" "$GITHUB_WORKSPACE/.SRCINFO" "$GITHUB_WORKSPACE/.gitignore" "$GITHUB_WORKSPACE/README.md" aur-pkg/ 2>/dev/null || true
          
          cd aur-pkg
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if [ -n "$(git status --porcelain)" ]; then
            git add .
            git commit -m "Update AUR package"
            git push origin master
          else
            echo "No changes to sync to AUR"
          fi
